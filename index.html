<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Filipe Andrade" />
  <meta name="description" content="Filipe Andrade linktree for social medias and e-mail contact." />

  <title>Filipe Andrade Linktree</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="content">
    <header>
      <img src="static/img/avatar.jpg" alt="avatar image" />

      <button id="theme-switch">
        <img src="static/svg/sun.svg" alt="sun icon" width="30" height="30" />
        <img src="static/svg/moon.svg" alt="moon icon" width="30" height="30" />
      </button>
    </header>

    <div class="authorname">
      <h3>Filipe Andrade</h3>
    </div>

    <ul>
      <li>
        <a href="mailto:filipeyay@disroot.org" target="_blank" rel="noopener noreferrer">
          <img src="static/svg/mail.svg" alt="email icon" width="20" />
          E-mail
        </a>
      </li>

      <li>
        <a href="https://github.com/filipeyay" target="_blank" rel="noopener noreferrer">
          <img src="static/svg/github.svg" alt="github icon" width="20" />
          GitHub
        </a>
      </li>

      <li>
        <a href="https://www.linkedin.com/in/filipemsandrade/" target="_blank" rel="noopener noreferrer">
          <img src="static/svg/linkedin.svg" alt="linkedin icon" width="20" />
          LinkedIn
        </a>
      </li>

      <li>
        <a href="https://docs.google.com/document/d/13qTpFXzaQvhr8bt4WrEVT4-qzJjc3Hf3/edit?usp=sharing&ouid=103259850802234798480&rtpof=true&sd=true"
          target="_blank" rel="noopener noreferrer">
          <img src="static/svg/feedback.svg" alt="Curriculum icon" width="20" />
          Currículo
        </a>
      </li>
    </ul>
  </div>

  <footer>
    <p>
      This <a href="https://github.com/filipeyay/linktree">linktree</a> was made using only HTML5, CSS3 and JavaScript.
      The source
      code is under the GPL 3.0 and later license.
    </p>
  </footer>

  <script src="./script.js" defer></script>
</body>

</html>
